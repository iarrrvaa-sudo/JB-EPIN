name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.13'

    - name: Prepare build environment
      run: |
        if [ -f debug.keystore.base64 ]; then
          (base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null) || (base64 --decode debug.keystore.base64 > debug.keystore 2>/dev/null) || true
        fi
        if [ ! -f debug.keystore ] || [ ! -s debug.keystore ]; then
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        if [ ! -f .env.example ]; then
          touch .env.example
        fi
        if [ ! -f .env ]; then
          cp .env.example .env 2>/dev/null || touch .env
        fi

    - name: Build APK Debug
      run: gradle assembleDebug --no-daemon --stacktrace -Dorg.gradle.configuration-cache=false

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JB-EPIN-App-Debug
        path: app/build/outputs/apk/debug/*.apk


