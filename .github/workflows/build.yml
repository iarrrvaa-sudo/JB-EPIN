name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper & Make Executable
      run: |
        gradle wrapper --gradle-version 8.13
        chmod +x gradlew

    - name: Prepare build environment (Restore Keystore & Env)
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        fi
        if [ ! -f .env ] && [ -f .env.example ]; then
          cp .env.example .env
        fi

    - name: Build APK Debug
      run: ./gradlew assembleDebug -Dorg.gradle.configuration-cache=false -Dkotlin.compiler.execution.strategy=daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JB-EPIN-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk
