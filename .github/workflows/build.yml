name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Prepare build environment
      run: |
        chmod +x gradlew || true
        if [ -f debug.keystore.base64 ]; then
          (base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null) || (base64 --decode debug.keystore.base64 > debug.keystore 2>/dev/null) || true
        fi
        if [ ! -f .env ] && [ -f .env.example ]; then
          cp .env.example .env
        fi

    - name: Build APK Debug
      run: ./gradlew assembleDebug --no-daemon -Dorg.gradle.configuration-cache=false

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: JB-EPIN-App-Debug
        path: app/build/outputs/apk/debug/app-debug.apk

